name: UI Production Tests

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  playwright-pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      TRIO_PROD_EMAIL: ${{ secrets.TRIO_PROD_EMAIL }}
      TRIO_PROD_PASSWORD: ${{ secrets.TRIO_PROD_PASSWORD }}
      HEADLESS: "true"
      DEFAULT_TIMEOUT_MS: "30000"
      BROWSER: "chromium"
      BROWSER_CHANNEL: "chrome"
      AUTH_FILE: "playwright/.auth/user.json"
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v2

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps chromium

      - name: Run validated Google MDM flow
        run: |
          pytest -v -s tests/ui/test_prod_google_mdm_connection.py

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-production-artifacts
          path: |
            artifacts/screenshots/**
            artifacts/logs/**
            artifacts/traces/**
            artifacts/auth_forensics/**
